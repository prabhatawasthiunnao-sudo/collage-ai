<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BITS Pilani Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      padding: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h2 {
      margin: 0;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1e4ed8;
    }

    .toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }

    .toggle a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      BITS Pilani Portal
    </div>

    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="email" placeholder="Email ID" required>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="toggle">
      New user? <a href="/public/signup.html">Sign Up</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})
      });
      const data = await res.json();
      if (res.ok) {
        // Redirect based on user role
        const redirectUrl = data.redirect_url || '/chat';
        window.location.href = redirectUrl;
      } else {
        alert(data.message || 'Login failed');
      }
    });
  </script>

</body>
</html>
